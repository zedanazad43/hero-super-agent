name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Deploy to Railway
        uses: railway-app/actions@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          project-id: ${{ secrets.RAILWAY_PROJECT_ID }}
          environment: production

      - name: Verify deployment
        run: |
          echo "✅ Hero-super-agent deployed to Railway"
          echo "Service: hero-super-agent"

      - name: Health check
        run: |
          sleep 30
          curl -f https://hero-super-agent.railway.app/health || echo "Health check pending"
