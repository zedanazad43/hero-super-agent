name: Deploy Hero Agent
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Deploy Cloudflare Worker
        run: |
          npm install -g wrangler
          wrangler --version
          echo "PLACEHOLDER: wrangler deploy requires Cloudflare credentials"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy API to Railway (placeholder)
        run: |
          echo "This is a scaffold; configure Railway deployment steps with secrets."
